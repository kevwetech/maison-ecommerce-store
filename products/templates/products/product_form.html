{% extends "dashboard/base.html" %}
{% load static %}

{% block title %}Add Product{% endblock %}
{% block nav_products %}active{% endblock %}

{% block content %}

<div class="page-header-row">
    <div>
        <h1 class="page-title">Add Product</h1>
        <p class="page-sub">Add a new product to your store</p>
    </div>
    <a href="{% url 'dashboard_products' %}" class="btn-secondary">
        <i class="fa-solid fa-arrow-left"></i> Back to Products
    </a>
</div>

<div class="card form-card">
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
            <label>Product Name</label>
            <input type="text" name="name" placeholder="e.g. Velvet Sofa" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Price ($)</label>
                <input type="number" name="price" placeholder="0.00" step="0.01" required>
            </div>
            <div class="form-group">
                <label>Stock</label>
                <input type="number" name="stock" placeholder="0" required>
            </div>
        </div>

        <div class="form-group">
            <label>Category</label>
            <select name="category" required>
                <option value="">-- Select Category --</option>
                {% for category in categories %}
                    <option value="{{ category.id }}">{{ category.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea name="description" placeholder="Product description..."></textarea>
        </div>

        <div class="form-group">
            <label>Main Product Image</label>
            <input type="file" name="image" accept="image/*">
        </div>

        <div class="form-group">
            <label>Additional Images <span style="color:#888; font-size:12px;">(front, back, sides — hold Ctrl to select multiple)</span></label>
            <input type="file" name="extra_images" accept="image/*" multiple>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">
                <i class="fa-solid fa-plus"></i> Add Product
            </button>
            <a href="{% url 'dashboard_products' %}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}

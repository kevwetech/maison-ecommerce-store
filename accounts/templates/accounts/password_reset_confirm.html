{% extends "products/base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'products/css/signup.css' %}">
{% endblock %}

{% block content %}
<section class="auth-container">
    <h2>Set New Password</h2>
    <p>Enter your new password below</p>

    <div class="auth-card">
        {% if messages %}
            {% for message in messages %}
                <p style="color:#c0392b; text-align:center; margin-bottom:15px;">{{ message }}</p>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="new_password1" placeholder="Enter new password" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="new_password2" placeholder="Confirm new password" required>
            </div>
            <button type="submit" class="btn-primary">Change Password</button>
        </form>
    </div>
</section>
{% endblock %}
